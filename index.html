<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ──────────────────────────────────────────── -->
    <title>ListMate — AI Listing Generator for UK Resellers</title>
    <meta name="description" content="Generate marketplace-ready titles, descriptions, pricing and tags for eBay, Vinted, Depop and TikTok Shop in seconds. Built for UK resellers." />
    <meta name="keywords" content="ebay listing generator, reseller tool, uk reseller, vinted listing, depop listing, ai listing, tiktok shop, listing description generator" />
    <meta name="author" content="ListMate" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://listmate.co.uk/" />

    <!-- ── Open Graph (Facebook / LinkedIn) ─────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://listmate.co.uk/" />
    <meta property="og:title" content="ListMate — AI Listing Generator for UK Resellers" />
    <meta property="og:description" content="Generate marketplace-ready listings for eBay, Vinted, Depop and TikTok Shop in seconds. Free to start." />
    <meta property="og:image" content="https://listmate.co.uk/og-image.png" />
    <meta property="og:site_name" content="ListMate" />
    <meta property="og:locale" content="en_GB" />

    <!-- ── Twitter Card ──────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@listmateuk" />
    <meta name="twitter:title" content="ListMate — AI Listing Generator for UK Resellers" />
    <meta name="twitter:description" content="Generate marketplace-ready listings for eBay, Vinted, Depop and TikTok Shop in seconds." />
    <meta name="twitter:image" content="https://listmate.co.uk/og-image.png" />

    <!-- ── Performance: preconnect to external origins ──────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ── Fonts — non-blocking with display=swap ────────────────── -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- ── Favicon ───────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#6366f1" />

    <!-- ── Structured Data (JSON-LD) ────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ListMate",
      "applicationCategory": "BusinessApplication",
      "description": "AI-powered listing generator for UK marketplace resellers",
      "operatingSystem": "Web",
      "offers": [
        { "@type": "Offer", "price": "0", "priceCurrency": "GBP", "name": "Free" },
        { "@type": "Offer", "price": "5.99", "priceCurrency": "GBP", "name": "Starter" },
        { "@type": "Offer", "price": "11.99", "priceCurrency": "GBP", "name": "Pro" }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
